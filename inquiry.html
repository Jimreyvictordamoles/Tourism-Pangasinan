<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Inquiry - Pangasinan Tourism</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Pangasinan Tourism</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="nav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="destinations.html">Destinations</a></li>
                    <li class="nav-item"><a class="nav-link" href="culture.html">Culture</a></li>
                    <li class="nav-item"><a class="nav-link" href="food.html">Food</a></li>
                    <li class="nav-item"><a class="nav-link" href="gallery.html">Gallery</a></li>
                    <li class="nav-item"><a class="nav-link" href="tips.html">Travel Tips</a></li>
                    <li class="nav-item"><a class="nav-link active" href="inquiry.html">Inquiry</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="bg-dark text-white text-center py-5">
        <h1>Inquiry Form</h1>
        <p>Plan your visit to Pangasinan</p>
    </section>

    <div class="container my-5">
        <div class="card shadow p-4">
            <form id="inquiryForm">
                <div class="mb-3">
                    <label>Full Name</label>
                    <input type="text" id="name" class="form-control">
                    <div class="error" id="nameError"></div>
                </div>

                <div class="mb-3">
                    <label>Email Address</label>
                    <input type="text" id="email" class="form-control">
                    <div class="error" id="emailError"></div>
                </div>

                <div class="mb-3">
                    <label>Contact Number</label>
                    <input type="text" id="contact" class="form-control">
                    <div class="error" id="contactError"></div>
                </div>

                <div class="mb-3">
                    <label>Selected Destination</label>
                    <select id="destination" class="form-control">
                        <option value="">-- Select Destination --</option>
                        <option>Hundred Islands</option>
                        <option>Bolinao Beach</option>
                        <option>Mount Balungao</option>
                        <option>Tayug Waterfalls</option>
                        <option>Manaoag Church</option>
                    </select>
                    <div class="error" id="destinationError"></div>
                </div>

                <div class="mb-3">
                    <label>Travel Date</label>
                    <input type="date" id="date" class="form-control">
                    <div class="error" id="dateError"></div>
                </div>

                <div class="mb-3">
                    <label>Number of Visitors</label>
                    <input type="number" id="visitors" class="form-control">
                    <div class="error" id="visitorsError"></div>
                </div>

                <div class="mb-3">
                    <label>Message</label>
                    <textarea id="message" class="form-control" rows="4"></textarea>
                    <div class="error" id="messageError"></div>
                </div>

                <button type="submit" class="btn btn-dark w-100">Submit Inquiry</button>
            </form>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-3">
        <p>© 2026 Pangasinan Tourism Website | Created by JVD</p>
    </footer>

    <script src="script/script.js"></script>

</body>
</html>
